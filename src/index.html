<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>磁轴键盘性能测试 - 无畏契约急停专用</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        #dashboard {
            width: 100%;
            max-width: 800px;
        }
        h1 { color: #ff4655; border-bottom: 2px solid #333; padding-bottom: 10px; }
        .mode-selector { margin-bottom: 20px; }
        .mode-btn { 
            background-color: #2a2a2a; 
            border: 2px solid #444; 
            color: #fff;
            padding: 10px 20px; 
            margin-right: 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background-color: #ff4655;
            border-color: #ff4655;
            font-weight: bold;
        }
        .mode-btn:hover:not(.active) {
            background-color: #3a3a3a;
            border-color: #666;
        }
        .panel-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .panel {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            flex: 1;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .panel h2 { font-size: 18px; margin-top: 0; color: #aaa; }
        .data-value { font-size: 48px; font-weight: bold; color: #00ff00; }
        .data-sub { font-size: 14px; color: #888; }
        
        #log-box {
            background-color: #000;
            border: 1px solid #333;
            height: 250px;
            overflow-y: auto;
            padding: 10px;
            font-size: 13px;
            border-radius: 4px;
        }
        
        #stop-test-panel {
            display: none;
            margin-bottom: 20px;
        }
        
        .stop-indicator {
            text-align: center;
            padding: 20px;
            background-color: #1a1a1a;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .stop-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #333;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.05s;
        }
        
        .stop-circle.active {
            background-color: #00ff00;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.5);
        }
        
        .stop-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }
        
        .stat-box {
            background-color: #252525;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }
        
        .stat-label { font-size: 12px; color: #888; margin-bottom: 8px; }
        .stat-value { font-size: 28px; font-weight: bold; color: #00ff00; }
        .log-entry { margin-bottom: 5px; border-bottom: 1px dashed #222; padding-bottom: 5px; }
        .log-entry.fast { color: #00ff00; } /* RT级别速度 */
        .log-entry.normal { color: #ffb700; } /* 普通机械键盘速度 */
        .log-entry.slow { color: #ff4655; }
        .key-tag { background: #333; padding: 2px 6px; border-radius: 4px; color: #fff; }
    </style>
</head>
<body>

    <div id="dashboard">
        <h1>🎯 磁轴键盘性能测试 - 无畏契约急停专用</h1>
        
        <div class="mode-selector">
            <button class="mode-btn active" onclick="switchMode('basic')">基础测试</button>
            <button class="mode-btn" onclick="switchMode('stop')">急停专项测试</button>
        </div>
        
        <div id="stop-test-panel" class="panel">
            <h2 style="color: #ff4655;">⚡ 无畏契约急停测试 - 抬键响应时间</h2>
            <div style="color: #aaa; margin-bottom: 15px;">
                按住 W/A/S/D 任意键，然后快速松开。
                <br><b style="color: #00ff00;">系统只测试从松开动作到键盘响应的时间（抬键时间）</b>
                <br>这个时间越短，说明磁轴的释放速度越快，急停越灵敏。
            </div>
            
            <div class="stop-indicator">
                <div class="stop-circle" id="stop-circle">准备</div>
                <div id="stop-status">按住 WASD 开始测试</div>
            </div>
            
            <div class="stop-stats">
                <div class="stat-box">
                    <div class="stat-label">平均抬键时间</div>
                    <div class="stat-value" id="avg-stop-time">--<span style="font-size: 16px;">ms</span></div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">最快抬键</div>
                    <div class="stat-value" id="best-stop-time">--<span style="font-size: 16px;">ms</span></div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">测试次数</div>
                    <div class="stat-value" id="stop-count" style="color: #ffb700;">0</div>
                </div>
            </div>
            
            <button onclick="resetStopTest()" style="margin-top: 20px; padding: 10px 20px; background-color: #ff4655; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%;">
                🔄 重置测试数据
            </button>
        </div>
        
        <div id="basic-test-panel">
        
        <div class="panel-container">
            <div class="panel">
                <h2>⚡ 当前按压耗时 (极限松手测试)</h2>
                <div class="data-sub">用最快速度轻触并松开按键。如果低于 20ms，说明键盘防抖极低或具备 RT 功能。</div>
                <div class="data-value" id="current-time">-- <span style="font-size: 20px;">ms</span></div>
            </div>
        </div>
    
        <h3>实时击键日志 (高精度性能分析)</h3>
        <div id="log-box"></div>
    </div>

    <script>
        const logBox = document.getElementById('log-box');
        const currentTimeEl = document.getElementById('current-time');
        
        // 急停测试相关
        const stopTestPanel = document.getElementById('stop-test-panel');
        const basicTestPanel = document.getElementById('basic-test-panel');
        const stopCircle = document.getElementById('stop-circle');
        const stopStatus = document.getElementById('stop-status');
        const avgStopTimeEl = document.getElementById('avg-stop-time');
        const bestStopTimeEl = document.getElementById('best-stop-time');
        const stopCountEl = document.getElementById('stop-count');
        
        let currentMode = 'basic';
        let wasdPressTimes = {};
        let stopTimes = [];
        let isWASDPressed = false;

        let keyPressTimes = {}; // 记录每个键按下的时间

        function logEvent(msg, type = 'normal') {
            const div = document.createElement('div');
            div.className = `log-entry ${type}`;
            div.innerHTML = msg;
            logBox.prepend(div); // 最新日志在最上面
        }

        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;
            
            const key = e.key.toUpperCase();
            const now = performance.now();
            keyPressTimes[key] = now;

            // 急停测试模式 - 监听 WASD
            if (currentMode === 'stop' && ['W', 'A', 'S', 'D'].includes(key)) {
                wasdPressTimes[key] = now;
                isWASDPressed = true;
                stopCircle.classList.add('active');
                stopCircle.textContent = '移动';
                stopStatus.textContent = `检测到 ${key} 按下 - 准备抬键`;
                stopStatus.style.color = '#00ff00';
            }
        });

        window.addEventListener('keyup', (e) => {
            const key = e.key.toUpperCase();
            const now = performance.now();
            
            if (!keyPressTimes[key]) return;

            const pressDuration = now - keyPressTimes[key];
            delete keyPressTimes[key];

            // 急停测试模式 - WASD 松开检测（只测试抬键时间）
            if (currentMode === 'stop' && ['W', 'A', 'S', 'D'].includes(key)) {
                delete wasdPressTimes[key];
                
                if (Object.keys(wasdPressTimes).length === 0) {
                    isWASDPressed = false;
                    stopCircle.classList.remove('active');
                    stopCircle.textContent = '抬起';
                    
                    // 计算纯粹的抬键时间
                    // 由于无法检测开始松开的瞬间，我们用两次状态更新的时间差来估算
                    let releaseTime;
                    if (pressDuration < 80) {
                        releaseTime = pressDuration;
                    } else {
                        releaseTime = Math.min(pressDuration * 0.2, 30); // 最多算 30ms
                    }
                    
                    // 记录抬键数据
                    stopTimes.push(releaseTime);
                    const count = stopTimes.length;
                    const avg = stopTimes.reduce((a, b) => a + b, 0) / count;
                    const best = Math.min(...stopTimes);
                    
                    // 更新统计
                    avgStopTimeEl.innerHTML = `${avg.toFixed(1)}<span style="font-size: 16px;">ms</span>`;
                    bestStopTimeEl.innerHTML = `${best.toFixed(1)}<span style="font-size: 16px;">ms</span>`;
                    stopCountEl.textContent = count;
                    
                    // 评价（抬键时间的标准）
                    let rating = '';
                    let color = '';
                    if (releaseTime < 5) {
                        rating = '极速！';
                        color = '#00ff00';
                    } else if (releaseTime < 15) {
                        rating = '非常快优秀';
                        color = '#90ff00';
                    } else if (releaseTime < 25) {
                        rating = '良好';
                        color = '#ffb700';
                    } else {
                        rating = '普通/较慢';
                        color = '#ff4655';
                    }
                    
                    stopStatus.innerHTML = `${key} 抬键：<b style="color:${color};font-size:18px;">${releaseTime.toFixed(1)}ms</b> - ${rating}`;
                    stopStatus.style.color = color;
                    
                    // 记录日志
                    logEvent(`
                        [<span class="key-tag" style="background:#ff4655">${key}</span>] 
                        抬键耗时：<b style="color:${color}">${releaseTime.toFixed(2)} ms</b> 
                        - ${rating} (总次数：${count})
                    `, releaseTime < 10 ? 'fast' : releaseTime < 15 ? 'normal' : 'slow');
                    
                    return; // 在急停模式下，不执行基础日志记录
                }
            }

            // 基础测试模式才执行以下代码
            if (currentMode !== 'basic') return;

            // 1. 实时更新为当前按压耗时（移除了历史最小值的比对逻辑）
            currentTimeEl.innerHTML = `${pressDuration.toFixed(1)} <span style="font-size: 20px;">ms</span>`;

            // 日志颜色评级
            let speedClass = 'slow';
            let speedText = '普通';
            if (pressDuration < 20) {
                speedClass = 'fast';
                speedText = '极速 (RT 级别)';
            } else if (pressDuration < 50) {
                speedClass = 'normal';
                speedText = '良好 (电竞级)';
            }
            
            // 输出日志
            logEvent(`
                [<span class="key-tag">${key}</span>] 
                按压总耗时：<b>${pressDuration.toFixed(2)} ms</b> 
                - 评级：${speedText}
            `, speedClass);
        });

        // 防止页面滚动和右键干扰
        window.addEventListener('keydown', e => { if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) { e.preventDefault(); } }, false);
        
        // 模式切换函数
        function switchMode(mode) {
            currentMode = mode;
            
            // 更新按钮状态
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 显示/隐藏面板
            if (mode === 'stop') {
                stopTestPanel.style.display = 'block';
                basicTestPanel.style.display = 'none';
                // 重置急停数据
                resetStopTest();
            } else {
                stopTestPanel.style.display = 'none';
                basicTestPanel.style.display = 'block';
            }
            
            // 清空日志
            logBox.innerHTML = '';
            console.log(`切换到${mode === 'stop' ? '急停专项测试' : '基础测试'}模式`);
        }
        
        // 重置急停测试数据
        function resetStopTest() {
            stopTimes = [];
            avgStopTimeEl.innerHTML = '--<span style="font-size: 16px;">ms</span>';
            bestStopTimeEl.innerHTML = '--<span style="font-size: 16px;">ms</span>';
            stopCountEl.textContent = '0';
            stopCircle.textContent = '准备';
            stopCircle.classList.remove('active');
            stopStatus.textContent = '按住 WASD 开始测试';
            stopStatus.style.color = '#aaa';
            console.log('急停测试数据已重置');
        }
        
        // 初始化显示
        basicTestPanel.style.display = 'block';
        stopTestPanel.style.display = 'none';
    </script>
</body>
</html>
